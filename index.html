<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Home-screen app. The manifest's "scope" is what keeps every Paket inside
     the app instead of bouncing it into an in-app Safari view; the apple-*
     tags are the same instruction for iOS versions that predate manifests.
     All same-origin: still no external requests. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wortwerk">
<meta name="theme-color" content="#16181D">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<title>Wortwerk — Übersicht</title>
<!-- No external requests. Nothing about your use of this app leaves the device.
     To restore the original Barlow Condensed / IBM Plex typography, delete the
     comment markers around the three lines below — same as in every Paket file. -->
<!--
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
-->
<style>
:root{
  --paper:#E7E8E3; --paper-2:#DDDFD8; --card:#F5F6F2;
  --ink:#16181D; --ink-60:#5A5F68; --ink-40:#8A8F96;
  --line:#C6C9C1;
  --blau:#0A5FCE; --himmel:#29A3E0; --gruen:#1F9E63;
  --violett:#6A4CE0; --gelb:#E8A200; --rot:#CE3B2B;
  --disp:'Barlow Condensed','Avenir Next Condensed','Roboto Condensed','Arial Narrow','Segoe UI',system-ui,sans-serif;
  --body:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  --r:3px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink); font-family:var(--body);
  font-size:16px; line-height:1.5; overscroll-behavior-y:none;
  background-image:linear-gradient(var(--paper-2) 1px,transparent 1px),linear-gradient(90deg,var(--paper-2) 1px,transparent 1px);
  background-size:28px 28px; background-position:-1px -1px;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 96px;padding-bottom:calc(96px + env(safe-area-inset-bottom))}

/* ---------- header ---------- */
.top{position:relative;z-index:40;background:var(--ink);color:var(--paper);margin:0 0 0;padding:10px 14px 8px;padding-top:calc(10px + env(safe-area-inset-top))}
.top-row{display:flex;align-items:center;gap:10px;max-width:732px;margin:0 auto}
.mark{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.mark span{color:var(--gelb)}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:3px 7px;border:1px solid rgba(231,232,227,.35);border-radius:var(--r);white-space:nowrap}
.chip.fire{border-color:var(--gelb);color:var(--gelb)}
.chip.lang{font-weight:600;letter-spacing:.12em;opacity:.75;transition:opacity .2s}
.chip.lang:hover,.chip.lang:focus-visible{opacity:1}
.spacer{flex:1}
.xpbar{max-width:732px;margin:8px auto 0;height:5px;background:rgba(231,232,227,.18);border-radius:2px;overflow:hidden}
.xpbar i{display:block;height:100%;background:var(--gelb);width:0;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.xplabel{max-width:732px;margin:4px auto 0;display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:rgba(231,232,227,.6);text-transform:uppercase}

/* ---------- generic blocks ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:14px}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-40);margin:0 0 8px}
h2.sec{font-family:var(--disp);font-size:27px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:26px 0 4px;line-height:1}
.muted{color:var(--ink-60);font-size:14px;margin:0 0 12px}
.tiny{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--ink-40)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--ink);color:var(--paper);
  font-family:var(--disp);text-transform:uppercase;letter-spacing:.07em;font-weight:600;font-size:15px;
  padding:7px 13px;border-radius:var(--r)}

/* ---------- streckenplan (signature — reused as the hub's hero) ---------- */
.strecke{background:var(--ink);border-radius:var(--r);padding:16px 14px 12px;margin-bottom:6px;color:var(--paper);position:relative;overflow:hidden}
.strecke .eyebrow{color:rgba(231,232,227,.5)}
.rail{position:relative;height:96px;margin-top:6px}
.rail-line{position:absolute;left:0;right:0;top:34px;height:6px;background:rgba(231,232,227,.16);border-radius:3px}
.rail-done{position:absolute;left:0;top:34px;height:6px;background:var(--gelb);border-radius:3px;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.stn{position:absolute;top:0;transform:translateX(-50%);text-align:center;width:48px}
.stn b{display:block;font-family:var(--disp);font-size:17px;font-weight:700;letter-spacing:.04em;line-height:1;height:20px}
.stn .dot{width:15px;height:15px;border-radius:50%;background:var(--ink);border:3px solid rgba(231,232,227,.35);margin:9px auto 0;transition:.4s}
.stn.on .dot{border-color:var(--gelb);background:var(--gelb)}
.stn.here .dot{box-shadow:0 0 0 5px rgba(232,162,0,.25)}
.stn s{display:block;text-decoration:none;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:rgba(231,232,227,.5);margin-top:7px}
.train{position:absolute;top:26px;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--ink);background:var(--gelb);
  padding:1px 5px;border-radius:2px;white-space:nowrap;font-weight:600;transition:left .8s cubic-bezier(.2,.8,.2,1)}

/* ---------- pack picker ---------- */
.packgrid{display:grid;grid-template-columns:1fr;gap:10px}
.packcard{position:relative;display:flex;flex-direction:column;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:14px 15px;transition:transform .1s}
.packcard.live{border-left:5px solid var(--gelb)}
.packcard.live:active{transform:translateY(1px)}
.packcard.locked{opacity:.5}
.pk-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.pk-id{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-40)}
.pk-name{font-family:var(--disp);font-size:23px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;line-height:1.05;margin:2px 0 0}
.pk-bar{height:6px;background:var(--paper-2);border-radius:3px;overflow:hidden}
.pk-bar i{display:block;height:100%;background:var(--blau)}
.pk-meta{display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-60)}
.pk-cta{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:var(--ink);color:var(--paper)}
.pk-cta.soon{background:transparent;color:var(--ink-40);border:1px dashed var(--line)}

/* ---------- badges ---------- */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.badge{border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:10px 8px;text-align:center;opacity:.4}
.badge.got{opacity:1;border-color:var(--gelb);background:#FDF4E0}
.badge b{display:block;font-family:var(--disp);font-size:14px;text-transform:uppercase;letter-spacing:.03em;line-height:1.1;overflow-wrap:break-word;word-break:break-word}
.badge s{display:block;text-decoration:none;font-size:10px;color:var(--ink-60);margin-top:3px;line-height:1.2}
.badge em{font-style:normal;font-size:19px;display:block;margin-bottom:3px}

.toast{position:fixed;left:50%;bottom:74px;bottom:calc(74px + env(safe-area-inset-bottom));transform:translate(-50%,20px);background:var(--ink);color:var(--paper);
  padding:10px 16px;border-radius:var(--r);font-family:var(--disp);font-size:18px;letter-spacing:.05em;text-transform:uppercase;
  z-index:80;opacity:0;pointer-events:none;transition:.25s}
.toast.on{opacity:1;transform:translate(-50%,0)}
.storewarn{background:var(--rot);color:#fff;padding:11px 13px;border-radius:var(--r);margin:14px 0;font-size:13.5px;line-height:1.4}
.storewarn b{font-family:var(--disp);font-size:18px;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:2px}
.hide{display:none!important}

/* ---------- Ton · KLANG ---------- */
.soundbar{position:fixed;right:12px;bottom:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:70;display:flex;gap:2px;background:var(--ink);
  border-radius:999px;padding:4px;box-shadow:0 3px 16px rgba(22,24,29,.3)}
.sb{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  width:44px;height:44px;border-radius:999px;color:rgba(231,232,227,.45);transition:color .2s,background .2s}
.sb em{font-style:normal;font-size:16px;line-height:1;display:block;height:12px}
.sb s{text-decoration:none;font-family:var(--mono);font-size:8px;letter-spacing:.1em;line-height:1}
.sb[aria-pressed="true"]{color:var(--gelb);background:rgba(232,162,0,.15)}
.sb[aria-pressed="false"]::after{content:"";position:absolute;left:11px;right:11px;top:50%;height:1.5px;
  background:currentColor;border-radius:1px;transform:rotate(-27deg);opacity:.75}
.eq{display:flex;gap:2px;align-items:flex-end;height:12px}
.eq i{width:2.5px;height:3px;background:currentColor;border-radius:1px}
.sb[aria-pressed="true"] .eq i{animation:eqb .95s ease-in-out infinite}
.eq i:nth-child(2){animation-delay:.19s}
.eq i:nth-child(3){animation-delay:.38s}
@keyframes eqb{0%,100%{height:3px}50%{height:12px}}
.wv{position:relative;display:block;width:13px;height:12px}
.wv i{position:absolute;top:50%;left:0;border:1.5px solid transparent;border-right-color:currentColor;
  border-radius:50%;transform:translateY(-50%)}
.wv i:nth-child(1){width:4px;height:4px}
.wv i:nth-child(2){width:8px;height:8px}
.wv i:nth-child(3){width:12px;height:12px}

/* ---------- a header that cannot overflow ---------- */
body{overflow-x:clip}
.top-row{gap:8px;min-width:0}
.top-row .chip{flex:0 0 auto}
.xplabel{gap:10px}
.xplabel span{flex:0 0 auto}
.xplabel .rnk{flex:1 1 auto;min-width:0;text-align:center;color:var(--gelb);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- soft transitions ---------- */
#veil{position:fixed;inset:0;background:var(--paper);z-index:200;pointer-events:none;opacity:0;
  animation:veilOut .42s ease-out both}
#veil.leaving{animation:veilIn .2s ease-in both}
@keyframes veilOut{from{opacity:1}to{opacity:0}}
@keyframes veilIn{from{opacity:0}to{opacity:1}}
.vfade{animation:vfade .3s cubic-bezier(.2,.8,.2,1) both}
@keyframes vfade{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.cardin{animation:cardin .26s cubic-bezier(.2,.8,.2,1) both}
@keyframes cardin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.verdict{animation:cardin .26s cubic-bezier(.2,.8,.2,1) both}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:3px solid var(--blau);outline-offset:2px}
@media(max-width:560px){.packgrid{grid-template-columns:1fr}}
@media(min-width:561px){.packgrid{grid-template-columns:1fr 1fr}}
/* ============ REICH ============ */
.sprite{image-rendering:pixelated;display:block}
.hofline{display:flex;align-items:center;gap:18px;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-bottom:14px}
.hofline .hofher{flex:none}
.hofline .hofinfo{flex:1;min-width:0}
.hofline .hofinfo h3{font-family:var(--disp);font-size:26px;margin:0 0 1px;line-height:1}
.hofline .hofinfo p{margin:0}
.sternebig{font-family:var(--mono);font-size:16px;color:var(--gelb);white-space:nowrap}
@media(max-width:520px){
  .hofline{flex-wrap:wrap;gap:12px}
  .hofline .hofinfo{flex:1 1 60%}
  .sternebig{flex:1 1 100%;text-align:right}
}
.karte{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));
  background:var(--paper-2);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:28px 28px;background-position:-1px -1px;
  border:1px solid var(--line);border-radius:var(--r);padding:16px}
.prov{position:relative;overflow:hidden;text-decoration:none;color:inherit;
  background:var(--card);border:1px solid var(--line);border-radius:6px;padding:11px 12px 8px;
  display:flex;flex-direction:column;gap:6px;transition:transform .18s,border-color .18s}
a.prov:hover{border-color:var(--ink-40);transform:translateY(-2px)}
.prov.locked{background:transparent;border-style:dashed}
.prov.locked .pn{color:var(--ink-40)}
.prov.asleep{background:#EDEDE8}
.prov .ph{display:flex;align-items:center;gap:7px}
.prov .ph b{font-family:var(--disp);font-size:17px;letter-spacing:.01em}
.prov .pdot{width:9px;height:9px;border-radius:2px;flex:none}
.prov .pn{font-size:11.5px;color:var(--ink-60);font-family:var(--mono)}
.prov .pbar{display:block;height:6px;background:var(--paper-2);border-radius:3px;overflow:hidden}
.prov .pbar i{display:block;height:100%;border-radius:3px}
.prov .pm{font-family:var(--mono);font-size:10.5px;color:var(--ink-40)}
.pfoot{display:block;margin-top:2px}
.scene{display:block;width:100%;image-rendering:pixelated}
.hedge{position:absolute;left:0;right:0;bottom:0;height:5px;opacity:.45;
  background:repeating-linear-gradient(90deg,var(--rot) 0 3px,transparent 3px 8px)}
@media(prefers-reduced-motion:reduce){a.prov:hover{transform:none}}
@media(min-width:820px){
  .prov:nth-child(2){transform:translateY(12px)}
  .prov:nth-child(3){transform:translateY(-6px)}
  .prov:nth-child(5){transform:translateY(10px)}
  a.prov:nth-child(2):hover{transform:translateY(10px)}
  a.prov:nth-child(3):hover{transform:translateY(-8px)}
  a.prov:nth-child(5):hover{transform:translateY(8px)}
}
</style>
<script src="season.js"></script>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="mark">Wort<span>werk</span></div>
    <div class="spacer"></div>
    <button class="chip lang" id="langBtn" title="Deutsch / English">DE</button>
    <div class="chip" id="chLevel">Level 1</div>
    <div class="chip fire" id="chStreak">0 days</div>
  </div>
  <div class="xpbar"><i id="xpFill"></i></div>
  <div class="xplabel"><span id="xpNow">0 XP</span><span class="rnk" id="chRank"></span><span id="xpNext">100 XP → Stufe 2</span></div>
</header>

<main class="wrap">

<div class="storewarn hide" id="storeWarn"></div>

<section id="seasonSec" style="margin-top:14px">
  <p class="eyebrow" data-t="seasonEyebrow" style="margin-bottom:6px"></p>
  <span data-season-slot></span>
</section>

<div id="resume" class="panel hide" style="border-left:5px solid var(--gelb);margin-top:14px">
  <p class="eyebrow" data-t="resumeEyebrow"></p>
  <div id="resumeTxt" style="font-size:15px"></div>
</div>

<section>
  <p class="eyebrow" id="motto" style="margin-top:18px"></p>
  <h2 class="sec" style="margin-top:0" data-t="routeH"></h2>
  <p class="muted" data-t="routeP"></p>
  <div class="strecke">
    <p class="eyebrow" data-t="railEyebrow"></p>
    <div class="rail" id="rail"></div>
  </div>
</section>

<section>
  <h2 class="sec" data-t="reichH"></h2>
  <p class="muted" data-t="reichP"></p>
  <div class="hofline" id="hofLine"></div>
  <div class="karte" id="reichKarte"></div>
</section>

<section>
  <h2 class="sec" data-t="packsH"></h2>
  <p class="muted" data-t="packsP"></p>
  <div class="packgrid" id="packGrid"></div>
</section>

<section>
  <h2 class="sec" data-t="sideH"></h2>
  <p class="muted" data-t="sideP1"></p>
  <p class="muted" data-t="sideP2"></p>
  <div id="feldweg"></div>
</section>

<section>
  <h2 class="sec" data-t="badgesH"></h2>
  <p class="muted" data-t="badgesP"></p>
  <div class="badges" id="badgeGrid"></div>
</section>

<p class="tiny" style="text-align:center;margin-top:30px"><span data-t="footA"></span> <span id="storeMode">…</span> <span data-t="footB"></span></p>

</main>
<div class="toast" id="toast"></div>
<div class="soundbar" role="group" aria-label="Ton">
  <button class="sb" id="sbBgm" aria-pressed="false"><span class="eq"><i></i><i></i><i></i></span><s>BGM</s></button>
  <button class="sb" id="sbSe" aria-pressed="false"><span class="wv"><i></i><i></i><i></i></span><s>SE</s></button>
</div>
<div id="veil"></div>


<script>
/* ============================================================
   WORTWERK — hub
   Reads the same shared profile every Paket writes to. Never
   writes anything itself: this page only routes and displays.
   ============================================================ */
const K_PROFILE = 'wortwerk:profile';
const K_GRAM    = 'wortwerk:gram';
/* ============================================================
   LANGUAGE

   The hub speaks either language; the switch lives in the header
   and is remembered like everything else. German proper names
   (Wortwerk, the provinces, Der Feldweg) stay as they are in both
   — they are names, not labels.
   ============================================================ */
const K_LANG = 'wortwerk:lang';
let LANG = 'en';

    keeping: 'You are keeping company with', province: 'Province',

    storeAccount: 'your Claude account (it follows you across devices)',
    storeDevice: 'this browser only', storeMemory: 'this tab only — nothing will persist',

    welcome: 'Welcome to Wortwerk',
    musicOn: 'Music on', musicOff: 'Music off', seOn: 'Sound effects on', seOff: 'Sound effects off',
    musicHintOn: 'Turn music on', musicHintOff: 'Turn music off',

  },
  de: {
    docTitle: 'Wortwerk — Übersicht',
    level: 'Stufe', day: 'Tag', days: 'Tage', xpTo: 'XP → Stufe',
    resumeEyebrow: 'Weiter geht\u2019s',

    routeH: 'Route nach C2',
    routeP: 'Sechs Wegmarken, einundzwanzigtausend Wörter, ein Reisender. Jedes Paket schreibt in dasselbe Konto — ein Level, eine Serie, eine Linie nach vorn.',

function paintRail(learnedTotal) {
  const total = STATIONS[STATIONS.length - 1][1];
  const pos = v => Math.max(6, Math.min(93, 6 + 87 * Math.pow(Math.min(1, v / total), 0.55)));

  document.getElementById('rail').innerHTML =
    '<div class="rail-line"></div><div class="rail-done" style="width:' + done + '%"></div>' +
    STATIONS.map(([n, v]) => {
      const p = pos(v), on = learnedTotal >= v;
      const here = !on && (STATIONS.filter(s => learnedTotal < s[1])[0] || STATIONS[5])[0] === n;

function figureGrid(stufe, col, o) {
  o = o || {};
  const sleep = !!o.sleep, worn = o.worn || [];
  const ix = Math.max(0, Math.min(3, stufe | 0)), rows = STAGE[ix];
  const dress = sleep ? '#9C9B93' : col;
  const pale = sleep ? '#CBCAC2' : tint(col, 0.5);
  const gold = sleep ? '#B4B2A9' : '#E8A200';
  const pal = { '.': null, k: '#16181D', s: '#F5F6F2', h: '#16181D', d: dress, p: pale, g: gold, w: '#E7E8E3', b: sleep ? '#C9BDBA' : '#E9A8A0' };
  const grid = {};
  for (let y = 0; y < rows.length; y++) for (let x = 0; x < 12; x++) {
    const c = pal[rows[y].charAt(x)]; if (c) grid[x + ',' + y] = c;
  }
  const er = EYE_ROW[ix], face = GESICHT[o.face || (sleep ? 'schlaf' : 'ruhe')] || GESICHT.ruhe;
  for (let x = 3; x <= 8; x++) { grid[x + ',' + er] = pal.s; grid[x + ',' + (er + 1)] = pal.s; }
  face.e.forEach(x => { grid[x + ',' + er] = pal.k; });
  face.m.forEach(m => { grid[m[0] + ',' + (er + 1)] = m[1] === 'b' ? pal.b : pal.k; });
  worn.forEach(id => {
    const it = KLEIDER.find(k => k.id === id); if (!it) return;
    if (it.cloak) {
      const deep = sleep ? '#8E8D86' : tint(col, -0.28);
      for (let y = 8; y < rows.length; y++) [0, 1, 10, 11].forEach(x => { if (grid[x + ',' + y] || y > 10) grid[x + ',' + y] = deep; });
    } else it.px.forEach(p => { grid[p[0] + ',' + p[1]] = sleep ? '#B4B2A9' : (p[2] || it.c); });
  });
  return { grid: grid, h: rows.length };
}

function spriteSVG(stufe, col, o) {
  o = o || {};
  const px = o.px || 4, f = figureGrid(stufe, col, o);
  let out = '<svg class="sprite" width="' + (12 * px) + '" height="' + (f.h * px) +
    '" viewBox="0 0 12 ' + f.h + '" shape-rendering="crispEdges" aria-hidden="true">';
  Object.keys(f.grid).forEach(k => { const xy = k.split(','); out += '<rect x="' + xy[0] + '" y="' + xy[1] + '" width="1" height="1" fill="' + f.grid[k] + '"/>'; });
  return out + '</svg>';
}

  extra.forEach(id => { if (MOT[id]) items.push(id); });

  const dull = c => sleep ? '#B4B2A9' : c;
  let out = '<svg class="scene" viewBox="0 0 ' + W + ' ' + H + '" width="100%" ' +
    'preserveAspectRatio="xMidYMax meet" shape-rendering="crispEdges" aria-hidden="true">';
  const gamt = Math.max(0, 0.78 - Math.min(0.78, fl * 1.6));
  out += '<rect x="0" y="' + GY + '" width="' + W + '" height="1" fill="' + (sleep ? '#C4C3BA' : tint('#1F9E63', gamt)) + '"/>';
  if (!sleep && fm >= 0.30) out += '<rect x="70" y="1" width="3" height="3" fill="#E8A200"/>';

  items.slice(0, 7).forEach((id, i) => {
    const m = MOT[id]; if (!m) return;
    const w = m[0].length, h = m.length, x0 = 1 + i * 8, y0 = GY - h;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      const c = MOT_PAL[m[y].charAt(x)];
      if (c) out += '<rect x="' + (x0 + x) + '" y="' + (y0 + y) + '" width="1" height="1" fill="' + dull(c) + '"/>';
    }
  });
  if (!o.leer) {
    const f = figureGrid(o.stufe || 0, col, { sleep: sleep, worn: o.worn, face: o.face });
    const fx = W - 14, fy = GY - f.h;
    Object.keys(f.grid).forEach(k => {
      const xy = k.split(',');
      out += '<rect x="' + (fx + (+xy[0])) + '" y="' + (fy + (+xy[1])) + '" width="1" height="1" fill="' + f.grid[k] + '"/>';
    });
  }
  return out + '</svg>';
}

function landSVG(id, px) {
  const m = LAND_SP[id]; if (!m) return '';
  let out = '<svg width="' + (5 * px) + '" height="' + (5 * px) + '" viewBox="0 0 5 5" shape-rendering="crispEdges" aria-hidden="true">';
  for (let y = 0; y < 5; y++) for (let x = 0; x < 5; x++) {
    const c = LAND_PAL[m[y].charAt(x)];
    if (c) out += '<rect x="' + x + '" y="' + y + '" width="1" height="1" fill="' + c + '"/>';
  }
  return out + '</svg>';
}
function stufeOf(learned, total) {
  if (!total) return 0;
  const f = learned / total;
  return f >= 0.40 ? 3 : f >= 0.15 ? 2 : f >= 0.03 ? 1 : 0;
}

function paintReich(profile, packs) {
  const R = (profile && profile.reich) || {};
  const kleid = R.kleid || {}, land = R.land || {};
  const fileOf = id => (ROUTE.find(r => r.id === id) || {}).file;

  const read = p => {
    const rec = packs[p.pack];
    if (!rec) return { built: false, learned: 0, total: 0, mastered: 0, due: 0 };
    return {
      built: true, learned: rec.learned || 0, total: rec.total || 0,
      mastered: rec.mastered || 0, due: rec.due || 0, at: rec.at
    };
  };

  /* The exact rule a pack uses (paket*.html → schlaeft): a province sleeps
     because you have been away, not because a backlog is large. One finished
     run stamps R.wach[pack] = today() and wakes her; after that she only lies
     back down once RUHE days have passed AND a real backlog rebuilt. Reading
     the same shared registry here keeps the hub in step with the pack. */
  const schlaeft = (p, st) => {
    if (!st || !st.built) return false;
    const w = (R.wach && R.wach[p.pack]) || 0;
    if (!w) return st.due >= SCHLAF;
    return (today() - w) >= RUHE && st.due >= 20;
  };

  /* the court line — whoever you are currently keeping company */
  const tp = PROVINZ.find(p => p.pack === (R.tend || 'p1')) || PROVINZ[0];
  const ts = read(tp), tsl = schlaeft(tp, ts), tst = stufeOf(ts.learned, ts.total);
  const anyBuilt = PROVINZ.some(p => read(p).built);
  document.getElementById('hofLine').innerHTML =
    '<div class="hofher">' + spriteSVG(tst, tp.col, { px: 7, sleep: tsl, worn: kleid[tp.pack] || [] }) + '</div>' +
    '<div class="hofinfo"><p class="eyebrow">' + t('keeping') + '</p><h3>' + tp.her + '</h3>' +
    '<p class="muted">' + tp.code + ' · ' + t('province') + ' ' + tp.land + ' — ' +
    (!anyBuilt ? t('waitFirst')
      : tsl ? t('asleepWaiting', { n: ts.due })
        : stufeName(tst) + ' · ' + t('learnedOf', { a: ts.learned, b: ts.total })) + '</p></div>' +
    '<div class="sternebig">✦ ' + (R.sterne || 0) + '</div>';

  /* the map */
  document.getElementById('reichKarte').innerHTML = PROVINZ.map(p => {
    const st = read(p), sl = schlaeft(p, st), stu = stufeOf(st.learned, st.total);
    const pct = st.total ? Math.min(100, Math.round(100 * st.learned / st.total)) : 0;
    const file = fileOf(p.pack);
    const scene = st.built ? sceneSVG(p.col, {
      fl: st.total ? st.learned / st.total : 0, fm: st.total ? st.mastered / st.total : 0,
      sleep: sl, stufe: stu, worn: kleid[p.pack] || [], extra: land[p.pack] || []
    }) : sceneSVG(p.col, { fl: 0, fm: 0, leer: true });
    const inner =
      '<span class="ph"><i class="pdot" style="background:' + (st.built ? (sl ? '#9C9B93' : p.col) : '#C6C9C1') + '"></i>' +
      '<b>' + p.code + ' · ' + p.land + '</b></span>' +
      '<span class="pn">' + (st.built ? (sl ? t('asleepDue', { n: st.due }) : p.her + ' · ' + stufeName(stu)) : t('notYet')) + '</span>' +
      '<span class="pbar"><i style="width:' + pct + '%;background:' + (sl ? '#9C9B93' : p.col) + '"></i></span>' +
      '<span class="pm">' + (st.built ? st.learned + ' / ' + st.total + ' · ' + t('masteredN', { n: st.mastered }) : '&nbsp;') + '</span>' +
      '<span class="pfoot">' + scene + '</span>' +
      (sl ? '<span class="hedge"></span>' : '');
    return (st.built && file)
      ? '<a class="prov' + (sl ? ' asleep' : '') + '" href="' + file + '">' + inner + '</a>'
      : '<div class="prov locked">' + inner + '</div>';
  }).join('');
}

function paintPacks(packs) {
  // Merge the known roadmap with whatever the browser has actually recorded —
  // any pack that has ever been opened is "built", roadmap or not.
  const known = new Set(ROUTE.map(r => r.id));
  const extra = Object.keys(packs).filter(id => !known.has(id)).map(id => ({
    id, file: 'paket' + id.replace(/\D/g, '') + '.html',
    name: packs[id].name || id, total: packs[id].total || 0,
    order: 90 + Object.keys(packs).indexOf(id), built: true
  }));
  const list = [...ROUTE, ...extra].sort((a, b) => a.order - b.order);

  document.getElementById('packGrid').innerHTML = list.map(r => {
    const p = packs[r.id];
    const built = r.built || !!p;
    const name = (p && p.name) || r.name;
    const total = (p && p.total) || r.total;
    const learned = p ? p.learned || 0 : 0;
    const mastered = p ? p.mastered || 0 : 0;
    const pct = total ? Math.min(100, Math.round(100 * learned / total)) : 0;

    if (!built) {
      return '<div class="packcard locked"><div class="pk-top"><span class="pk-id">Paket ' + r.order + '</span><span class="pk-cta soon">' + t('soon') + '</span></div>' +
        '<p class="pk-name">' + esc(name) + '</p>' +
        '<p class="tiny" style="margin:0">' + t('notBuilt', { n: total.toLocaleString(LANG === 'de' ? 'de-DE' : 'en-GB') }) + '</p></div>';
    }
    const metaRight = p && p.at != null
      ? (today() - p.at === 0 ? t('openedToday') : t('daysAgo', { n: today() - p.at }))
      : t('notStarted');
    return '<a class="packcard live" href="' + r.file + '"><div class="pk-top"><span class="pk-id">Paket ' + r.order + '</span>' +
      '<span class="pk-cta">' + (learned > 0 ? t('resume') : t('start')) + '</span></div>' +
      '<p class="pk-name">' + esc(name) + '</p>' +
      '<div class="pk-bar"><i style="width:' + pct + '%"></i></div>' +
      '<div class="pk-meta"><span>' + t('packMeta', { a: learned, b: total, c: mastered }) + '</span><span>' + metaRight + '</span></div></a>';
  }).join('');
}

function paintBadges(earned) {
  const got = new Set(earned || []);
  const ids = Array.from(new Set([...Object.keys(BADGE_META), ...ROUTE.map(r => 'pack' + r.id.replace(/\D/g, '')), ...got]));
  document.getElementById('badgeGrid').innerHTML = ids.map(id => {
    const m = badgeMeta(id), on = got.has(id);
    return '<div class="badge ' + (on ? 'got' : '') + '"><em>' + m.icon + '</em><b>' + esc(badgeName(m)) + '</b><s>' + esc(badgeDesc(m)) + '</s></div>';
  }).join('');
}

function paintResume(packs) {
  const ids = Object.keys(packs).filter(id => packs[id] && packs[id].at != null);
  if (!ids.length) return;
  ids.sort((a, b) => (packs[b].at || 0) - (packs[a].at || 0));
  const top = ids[0], p = packs[top];
  const route = ROUTE.find(r => r.id === top);
  const file = route ? route.file : 'paket' + top.replace(/\D/g, '') + '.html';
  const d = today() - p.at;
  const ago = d === 0 ? t('agoToday') : d === 1 ? t('agoYesterday') : t('agoDays', { n: d });
  const el = document.getElementById('resume');
  el.classList.remove('hide');
  document.getElementById('resumeTxt').innerHTML =
    t('lastTime', { ago: ago, name: esc(p.name || top), a: p.learned || 0, b: p.total || '?' }) +
    '<br><a class="btn" style="margin-top:9px" href="' + file + '">' + t('continue') + '</a>';
}


/* ============================================================
   KLANG — sound, in two switches.
   BGM  a slow generative piano, built from oscillators at run
        time: four chords, a pentatonic melody that never quite
        repeats, one soft delay standing in for a room.
   SE   short piano flourishes on the moments that matter.
   No audio files, no network — the same rule as everything else
   here. This block is identical in every page of the app.
   ============================================================ */
const KLANG = (() => {
  const KEY = 'wortwerk:klang';
  const pref = { bgm: false, se: true, vol: .8 };

  let ctx = null, master = null, room = null, busM = null, busS = null;
  let clock = null, beat = 0, nextAt = 0, walk = 4, told = false;

  const BEAT = 1.05;                                   // 57 bpm — walking pace, not marching
  const CHORDS = [                                     // D · Bm · G · A, eight beats each
    { bass: 38, tones: [50, 57, 62, 66] },
    { bass: 35, tones: [47, 54, 59, 62] },
    { bass: 31, tones: [43, 50, 55, 59] },
    { bass: 33, tones: [45, 52, 57, 61] }
  ];
  const SCALE = [57, 62, 64, 66, 69, 71, 74, 76];      // D major pentatonic, A3 to E5
  const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
  const rand = (a, b) => a + Math.random() * (b - a);

  /* ---- preference: localStorage now, account storage when it answers ---- */
  function load() {
    try { const v = localStorage.getItem(KEY); if (v) Object.assign(pref, JSON.parse(v)); } catch (e) { }
    (async () => {
      try {
        if (window.storage) {
          const r = await window.storage.get(KEY);
          if (r) { Object.assign(pref, JSON.parse(r.value)); paint(); apply(); }
        }
      } catch (e) { }
    })();
  }
  function store() {
    const s = JSON.stringify(pref);
    try { localStorage.setItem(KEY, s); } catch (e) { }
    try { if (window.storage) window.storage.set(KEY, s); } catch (e) { }
  }

  /* ---- the instrument ---- */
  function build() {
    if (ctx) return ctx;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    try { ctx = new AC(); } catch (e) { return null; }

    master = ctx.createGain(); master.gain.value = pref.vol * .9; master.connect(ctx.destination);

    // one feedback delay through a low-pass: a room, for the price of four nodes
    room = ctx.createGain(); room.gain.value = .3;
    const dl = ctx.createDelay(1), fb = ctx.createGain(), lp = ctx.createBiquadFilter();
    dl.delayTime.value = .27; fb.gain.value = .33;
    lp.type = 'lowpass'; lp.frequency.value = 1500;
    room.connect(dl); dl.connect(lp); lp.connect(fb); fb.connect(dl); lp.connect(master);

    // the music runs through its own tone control: a gentle low-pass and a
    // shelf that take the top off every note before it can ever get shrill
    busM = ctx.createGain(); busM.gain.value = 0;      // music, always faded not cut
    const soft = ctx.createBiquadFilter(), tilt = ctx.createBiquadFilter();
    soft.type = 'lowpass'; soft.frequency.value = 1250; soft.Q.value = .5;
    tilt.type = 'highshelf'; tilt.frequency.value = 900; tilt.gain.value = -11;
    busM.connect(soft); soft.connect(tilt); tilt.connect(master); tilt.connect(room);

    busS = ctx.createGain(); busS.gain.value = .9;     // effects, left crisp
    busS.connect(master); busS.connect(room);
    return ctx;
  }

  /* One note. Four slightly stretched partials plus a hammer tick:
     enough inharmonicity to read as a piano, cheap enough to spam. */
  const PARTIALS = [[1, 1], [2.003, .3], [3.011, .11], [4.02, .045]];
  function note(midi, at, dur, vol, bus, soft) {
    if (!ctx) return;
    const t = Math.max(at, ctx.currentTime + .004), f = mtof(midi);
    const g = ctx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.max(.0005, vol), t + .01);
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    g.connect(bus);
    (soft ? PARTIALS.slice(0, 3) : PARTIALS).forEach(([m, a]) => {
      const o = ctx.createOscillator(), pg = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f * m; pg.gain.value = a;
      o.connect(pg); pg.connect(g); o.start(t); o.stop(t + dur + .06);
    });
    const h = ctx.createOscillator(), hg = ctx.createGain();
    h.type = 'triangle'; h.frequency.value = f * (soft ? 3.02 : 5.2);
    hg.gain.setValueAtTime(vol * (soft ? .05 : .2), t);
    hg.gain.exponentialRampToValueAtTime(.0001, t + .045);
    h.connect(hg); hg.connect(bus); h.start(t); h.stop(t + .09);
  }

  /* ---- the music: written one beat ahead, never looped ---- */
  function schedule(t, b) {
    const ch = CHORDS[Math.floor(b / 8) % CHORDS.length], step = b % 8;
    if (step === 0) {
      note(ch.bass, t, 7, .055, busM, true);
      ch.tones.forEach((m, i) => note(m, t + .09 + i * .38, 4.5, .032, busM, true));
    } else if (step === 4) {
      note(ch.bass + 7, t, 5, .035, busM, true);
    }
    if (step % 2 === 1 || Math.random() < .22) {
      if (Math.random() < .42) return;                 // rests are half the music
      walk = Math.max(0, Math.min(SCALE.length - 1, walk + Math.round(rand(-2.4, 2.4))));
      const m = SCALE[walk];
      note(m, t + rand(0, .12), rand(2.4, 3.8), rand(.05, .09) * (m > 71 ? .8 : 1), busM, true);
      if (Math.random() < .18) note(m - 12, t + .13, 3.4, .03, busM, true);  // an octave down, for warmth
    }
  }
  function tick() {
    if (!ctx) return;
    const look = ctx.currentTime + 1.3;
    while (nextAt < look) { schedule(nextAt, beat); beat++; nextAt += BEAT; }
  }
  function startMusic() {
    if (!build() || clock) return;
    nextAt = ctx.currentTime + .25; tick();
    clock = setInterval(tick, 260);
    busM.gain.cancelScheduledValues(ctx.currentTime);
    busM.gain.setValueAtTime(Math.max(.0001, busM.gain.value), ctx.currentTime);
    busM.gain.linearRampToValueAtTime(1, ctx.currentTime + 2.2);
  }
  function stopMusic(fade) {
    if (clock) { clearInterval(clock); clock = null; }
    if (!ctx) return;
    busM.gain.cancelScheduledValues(ctx.currentTime);
    busM.gain.setValueAtTime(busM.gain.value, ctx.currentTime);
    busM.gain.linearRampToValueAtTime(0, ctx.currentTime + (fade === false ? .05 : 1.1));
  }

  /* ---- the effects ---- */
  const SE = {
    page: [[71, 0, .5, .035]],
    tap: [[76, 0, .5, .05]],
    start: [[69, 0, .7, .06], [76, .08, 1, .05]],
    right: [[76, 0, .6, .08], [81, .085, .95, .055]],
    wrong: [[59, 0, .5, .065], [57, .1, .75, .05]],
    shaky: [[66, 0, .8, .055], [64, .12, 1, .045]],
    combo: [[69, 0, .7, .06], [73, .07, .7, .06], [76, .14, .8, .06], [81, .21, 1.2, .06]],
    level: [[62, 0, 1.4, .075], [66, .075, 1.3, .07], [69, .15, 1.3, .07], [74, .225, 1.6, .07], [78, .3, 1.9, .06]],
    badge: [[81, 0, 1.7, .055], [85, .09, 1.6, .05], [88, .18, 2, .045]],
    done: [[50, 0, 2.6, .05], [57, .03, 2.4, .045], [62, .06, 2.4, .045], [66, .09, 2.2, .04]]
  };
  function se(name) {
    if (!pref.se || !SE[name] || !build() || ctx.state !== 'running') return;
    const t0 = ctx.currentTime + .01;
    SE[name].forEach(([m, o, d, v]) => note(m, t0 + o, d, v, busS));
  }

  /* ---- gates: browsers only make sound after a real gesture ---- */
  function apply() {
    if (!pref.bgm) { stopMusic(); return; }
    if (!build()) return;
    if (ctx.state === 'running') startMusic();
    else ctx.resume().then(startMusic).catch(() => { });
  }
  function unlock() {
    if (!build()) return;
    if (ctx.state !== 'running') ctx.resume().catch(() => { });
    if (pref.bgm) setTimeout(apply, 60);
  }

  function paint() {
    const m = document.getElementById('sbBgm'), s = document.getElementById('sbSe');
    if (m) { m.setAttribute('aria-pressed', !!pref.bgm); m.title = pref.bgm ? t('musicHintOff') : t('musicHintOn'); }
    if (s) { s.setAttribute('aria-pressed', !!pref.se); s.title = pref.se ? t('seHintOff') : t('seHintOn'); }
  }
  function say(msg) { try { if (typeof toast === 'function') toast(msg); } catch (e) { } }

  function toggle(what) {
    pref[what] = !pref[what];
    store(); paint();
    if (what === 'bgm') { apply(); say(pref.bgm ? t('musicOn') : t('musicOff')); }
    else { if (pref.se) se('right'); say(pref.se ? t('seOn') : t('seOff')); }
  }

  function wire() {
    load(); paint();
    const m = document.getElementById('sbBgm'), s = document.getElementById('sbSe');
    if (m) m.onclick = () => toggle('bgm');
    if (s) s.onclick = () => toggle('se');

    ['pointerdown', 'keydown'].forEach(ev =>
      window.addEventListener(ev, function once() {
        ['pointerdown', 'keydown'].forEach(e2 => window.removeEventListener(e2, once));
        unlock();
      }, { passive: true }));

    // leaving the tab shouldn't leave a piano playing to an empty room
    document.addEventListener('visibilitychange', () => {
      if (!ctx) return;
      if (document.hidden) { stopMusic(false); ctx.suspend().catch(() => { }); }
      else if (pref.bgm) ctx.resume().then(startMusic).catch(() => { });
    });

    if (pref.bgm) {
      apply();
      setTimeout(() => {
        if (!told && (!ctx || ctx.state !== 'running')) { told = true; say(t('musicFirstTap')); }
      }, 900);
    }
  }

  return { wire, se, toggle, pref, playing: () => !!clock };
})();

/* ============================================================
   NAV — softer page changes.
   One veil per page: it fades out on arrival (pure CSS, so it
   works even if this script never runs) and fades in before a
   link takes you elsewhere. Reduced-motion users get neither.
   ============================================================ */
const NAV = (() => {
  const still = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  const veil = () => document.getElementById('veil');

  function leave(href) {
    const v = veil();
    if (still || !v) { location.href = href; return; }
    v.classList.add('leaving');
    setTimeout(() => { location.href = href; }, 200);
  }
  /* re-trigger an entrance animation on an element that is already in the DOM */
  function enter(el, cls) {
    if (!el || still) return;
    el.classList.remove(cls || 'vfade');
    void el.offsetWidth;
    el.classList.add(cls || 'vfade');
  }
  function wire() {
    document.addEventListener('click', e => {
      if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      const a = e.target instanceof Element ? e.target.closest('a[href]') : null;
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.charAt(0) === '#' || href.indexOf(':') > -1 || a.target === '_blank' || a.hasAttribute('download')) return;
      e.preventDefault();
      leave(a.href);
    });
    // coming back with the back button must never leave the veil down
    window.addEventListener('pageshow', () => { const v = veil(); if (v) v.classList.remove('leaving'); });
  }
  return { wire, leave, enter };
})();


/* ============================================================
   THE SIDE PATH — Der Feldweg, seen from the hub.
   Its own scheduler key, so nothing here touches the packs; the
   hub only reads it and points the way.
   ============================================================ */
const FELDWEG = [
  { id: 'kasus', name: 'Die Artikelweide', en: 'The Article Pasture', girl: 'Liesl', role: 'goose girl', col: '#6A4CE0', n: 9 },
  { id: 'verb', name: 'Der Verbenacker', en: 'The Verb Field', girl: 'Grete', role: 'ploughwoman', col: '#1F9E63', n: 14 },
  { id: 'adj', name: 'Der Adjektivgarten', en: 'The Adjective Garden', girl: 'Marlene', role: 'gardener', col: '#E8A200', n: 6 },
  { id: 'prep', name: 'Der Präpositionsteich', en: 'The Preposition Pond', girl: 'Bärbel', role: 'fisherwoman', col: '#29A3E0', n: 6 },
  { id: 'satz', name: 'Die Satzbaumühle', en: 'The Sentence Mill', girl: 'Sanne', role: 'miller', col: '#0A5FCE', n: 10 },
  { id: 'pron', name: 'Die Pronomenscheune', en: 'The Pronoun Barn', girl: 'Ida', role: 'barn keeper', col: '#CE3B2B', n: 6 }
];
const FELD_N = FELDWEG.reduce((n, h) => n + h.n, 0);

function paintFeldweg(gram) {
  const L = (gram && gram.l) || {};
  const el = document.getElementById('feldweg');
  let mastAll = 0, dueAll = 0;
  const rows = FELDWEG.map(h => {
    let hi = 0, right = 0, mast = 0, due = 0;
    Object.keys(L).forEach(k => {
      if (k.indexOf(h.id + '.') !== 0) return;
      const r = L[k];
      hi += (r[6] || 0); right += (r[5] || 0);
      if (r[0] >= 7) mast++;
      if (r[4] > 0 && r[1] <= today()) due++;
    });
    mastAll += mast; dueAll += due;
    const naehe = Math.max(0, Math.min(100, Math.round(100 * (0.55 * hi / (9 * h.n) + 0.45 * Math.min(1, right / (h.n * 26))))));
    return { h: h, naehe: naehe, mast: mast, due: due };
  });
  const pct = Math.round(100 * mastAll / FELD_N);
  el.innerHTML =
    '<a class="packcard live" href="grammatik.html" style="border-left-color:var(--gruen)">' +
    '<div class="pk-top"><span class="pk-id">' + t('sideId') + '</span><span class="pk-cta">' +
    (dueAll ? t('sideDue', { n: dueAll }) : t('sideOpen')) + '</span></div>' +
    '<p class="pk-name">' + t('sideName') + '</p>' +
    '<p class="muted" style="margin:0 0 4px;font-size:13.5px">' + t('sideCard', { n: FELD_N }) + '</p>' +
    '<div class="pk-bar"><i style="width:' + pct + '%;background:var(--gruen)"></i></div>' +
    '<div class="pk-meta"><span>' + t('sideMeta', { a: mastAll, b: FELD_N }) + '</span><span>' + pct + '%</span></div>' +
    '</a>' +
    '<div class="karte" style="margin-top:10px;grid-template-columns:repeat(auto-fill,minmax(172px,1fr))">' +
    rows.map(function (r) {
      return '<a class="prov" href="grammatik.html"><div class="ph"><span class="pdot" style="background:' + r.h.col + '"></span>' +
        '<b>' + r.h.girl + '</b></div>' +
        '<span class="pn">' + (LANG === 'en' ? r.h.en : r.h.name) + '</span>' +
        '<span class="pbar"><i style="width:' + r.naehe + '%;background:' + r.h.col + '"></i></span>' +
        '<span class="pm">' + t('closeness', { n: r.naehe }) + ' · ' + r.mast + '/' + r.h.n + (r.due ? ' · ' + t('sideDue', { n: r.due }) : '') + '</span></a>';
    }).join('') +
    '</div>';
}

let DATA = { profile: {}, packs: {}, gram: {} };

function render() {
  applyStatic();
  const packs = DATA.packs;
  document.getElementById('motto').textContent = MOTTOS[today() % MOTTOS.length][LANG === 'en' ? 1 : 0];
  paintHeader(DATA.profile);
  paintResume(packs);
  paintRail(Object.values(packs).reduce((n, p) => n + (p.learned || 0), 0));
  paintReich(DATA.profile, packs);
  paintPacks(packs);
  paintFeldweg(DATA.gram);
  paintBadges(DATA.profile.badges);
  if (window.Season) Season.apply(DATA.profile.answers || 0, { announce: false });
  const modeTxt = { account: t('storeAccount'), device: t('storeDevice'), memory: t('storeMemory') };
  document.getElementById('storeMode').textContent = modeTxt[STORE_MODE] || modeTxt.device;
  const warn = document.getElementById('storeWarn');
  warn.classList.toggle('hide', STORE_MODE !== 'memory');
  if (STORE_MODE === 'memory') warn.innerHTML = t('warn');
}

async function boot() {
  const saved = await STORE.get(K_LANG);
  if (saved === 'de' || saved === 'en') LANG = saved;

  KLANG.wire(); NAV.wire();
  DATA.profile = await STORE.get(K_PROFILE) || {};
  DATA.packs = await STORE.get(K_PACKS) || {};
  DATA.gram = await STORE.get(K_GRAM) || {};

  const b = document.getElementById('langBtn');
  if (b) b.onclick = () => setLang(LANG === 'en' ? 'de' : 'en');

  render();
  setInterval(() => {
    const modeTxt = { account: t('storeAccount'), device: t('storeDevice'), memory: t('storeMemory') };
    document.getElementById('storeMode').textContent = modeTxt[STORE_MODE] || modeTxt.device;
  }, 2000);
  if (!Object.keys(DATA.packs).length) toast(t('welcome'));
}
boot();
</script>
</body>
